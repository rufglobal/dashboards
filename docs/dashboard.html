<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUF Room Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy-light: #111d33;
    --navy-mid: #162240;
    --gold: #d4a852;
    --gold-dim: rgba(212,168,82,0.15);
    --gold-text: #e8c87a;
    --teal: #3ab5b0;
    --teal-dim: rgba(58,181,176,0.12);
    --text: #c8d4e6;
    --text-dim: #5a6a84;
    --border: #1a2a45;
    --border-light: #223352;
    --z1: #3b9ece; --z1-bg: rgba(59,158,206,0.18);
    --z2: #c06ee0; --z2-bg: rgba(192,110,224,0.18);
    --z3: #8b7cf0; --z3-bg: rgba(139,124,240,0.18);
    --z4: #e09050; --z4-bg: rgba(224,144,80,0.18);
    --mihai: #3ab5b0; --mihai-bg: rgba(58,181,176,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: var(--navy); color: var(--text); }
  
  .topbar { padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .topbar h1 { font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .topbar h1 span { color: var(--gold); }
  .topbar .meta { font-size: 11px; color: var(--text-dim); font-weight: 300; }
  
  .controls { padding: 14px 32px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .controls button { background: var(--navy-mid); border: 1px solid var(--border-light); color: var(--text); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; font-family: 'Poppins',sans-serif; font-weight: 500; transition: all 0.15s; }
  .controls button:hover { background: var(--border-light); border-color: var(--gold-dim); }
  .controls button.active { background: linear-gradient(135deg, var(--gold) 0%, #c49340 100%); border-color: var(--gold); color: var(--navy); font-weight: 600; }
  .week-label { font-size: 14px; font-weight: 600; color: #fff; min-width: 210px; text-align: center; letter-spacing: -0.2px; }
  
  .legend { display: flex; gap: 16px; margin-left: auto; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); font-weight: 400; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  .view-toggle { display: flex; border: 1px solid var(--border-light); border-radius: 8px; overflow: hidden; }
  .view-toggle button { border: none; border-right: 1px solid var(--border-light); padding: 6px 16px; border-radius: 0; }
  .view-toggle button:last-child { border-right: none; }

  /* OVERVIEW */
  .overview-grid { display: grid; grid-template-columns: 110px repeat(7, 1fr); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--navy-light); margin: 20px 32px; }
  .ov-header { background: var(--navy-mid); padding: 12px 8px; font-size: 11px; font-weight: 600; text-align: center; border-bottom: 1px solid var(--border); color: var(--text-dim); }
  .ov-header.today { color: var(--gold-text); }
  .ov-resource { padding: 14px 12px; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; }
  .ov-resource .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; margin-top: 4px; flex-shrink: 0; }
  .ov-cell { padding: 8px; min-height: 80px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .ov-cell:hover { background: rgba(212,168,82,0.08); }
  .ov-cell.today { background: var(--gold-dim); }
  .ov-cell.today:hover { background: rgba(212,168,82,0.22); }
  .ov-event { padding: 3px 8px; margin-bottom: 3px; border-radius: 4px; font-size: 10px; font-weight: 400; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ov-event:hover { white-space: normal; }
  .ov-event.zoom1 { background: var(--z1-bg); color: var(--z1); border-left: 2px solid var(--z1); }
  .ov-event.zoom2 { background: var(--z2-bg); color: var(--z2); border-left: 2px solid var(--z2); }
  .ov-event.zoom3 { background: var(--z3-bg); color: var(--z3); border-left: 2px solid var(--z3); }
  .ov-event.zoom4 { background: var(--z4-bg); color: var(--z4); border-left: 2px solid var(--z4); }
  .ov-event.mihai { background: var(--mihai-bg); color: var(--mihai); border-left: 2px solid var(--mihai); }
  .ov-avail { color: var(--teal); font-size: 10px; padding: 3px 8px; opacity: 0.4; font-weight: 400; }

  .status-bar { display: flex; gap: 16px; padding: 20px 32px 4px; }
  .status-card { background: var(--navy-light); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; min-width: 130px; }
  .status-card .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
  .status-card .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .status-card .value.gold { color: var(--gold); }
  .status-card .value.teal { color: var(--teal); }
  .status-card .value.warm { color: var(--z4); }

  /* TIMELINE */
  .timeline { display: grid; grid-template-columns: 56px repeat(7, 1fr); margin: 0 32px; }
  .tl-corner { background: var(--navy); position: sticky; left: 0; z-index: 3; }
  .tl-day-header { background: var(--navy-mid); padding: 10px 4px; text-align: center; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text-dim); position: sticky; top: 0; z-index: 2; }
  .tl-day-header.today { color: var(--gold-text); }
  .tl-day-header .dn { font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tl-day-header .dnum { font-size: 18px; font-weight: 700; margin: 4px 0; color: #fff; }
  .tl-day-header.today .dnum { background: var(--gold); color: var(--navy); width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
  .tl-time { background: var(--navy); border-right: 1px solid var(--border); padding: 0 8px; font-size: 10px; color: var(--text-dim); text-align: right; position: sticky; left: 0; z-index: 1; height: 48px; display: flex; align-items: flex-start; justify-content: flex-end; transform: translateY(-6px); font-weight: 400; }
  .tl-cell { border-right: 1px solid #0f1a2e; position: relative; height: 48px; border-bottom: 1px solid #141f35; cursor: pointer; }
  .tl-cell:hover { background: var(--gold-dim); }
  .tl-half { position: absolute; top: 24px; left: 0; right: 0; border-top: 1px dotted #0f1a2e; }

  .ev { position: absolute; border-radius: 4px; z-index: 1; cursor: pointer; opacity: 0.85; transition: opacity 0.15s; min-height: 5px; }
  .ev:hover { opacity: 1; z-index: 5; }
  .ev.zoom1 { background: var(--z1-bg); border-left: 3px solid var(--z1); background: linear-gradient(90deg, rgba(59,158,206,0.3), rgba(59,158,206,0.1)); }
  .ev.zoom2 { background: var(--z2-bg); border-left: 3px solid var(--z2); background: linear-gradient(90deg, rgba(192,110,224,0.3), rgba(192,110,224,0.1)); }
  .ev.zoom3 { background: var(--z3-bg); border-left: 3px solid var(--z3); background: linear-gradient(90deg, rgba(139,124,240,0.3), rgba(139,124,240,0.1)); }
  .ev.zoom4 { background: var(--z4-bg); border-left: 3px solid var(--z4); background: linear-gradient(90deg, rgba(224,144,80,0.3), rgba(224,144,80,0.1)); }
  .ev.mihai { background: var(--mihai-bg); border-left: 3px solid var(--mihai); background: linear-gradient(90deg, rgba(58,181,176,0.3), rgba(58,181,176,0.1)); }

  .tooltip { display: none; position: fixed; background: var(--navy-mid); border: 1px solid var(--border-light); border-radius: 10px; padding: 12px 16px; font-size: 12px; color: var(--text); z-index: 100; pointer-events: none; max-width: 280px; box-shadow: 0 12px 32px rgba(0,0,0,0.5); font-family: 'Poppins',sans-serif; }
  .tooltip .tt-room { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 600; }
  .tooltip .tt-title { font-weight: 600; margin-bottom: 4px; color: #fff; }
  .tooltip .tt-time { color: var(--text-dim); font-size: 11px; font-weight: 400; }
  .tooltip.zoom1 .tt-room{color:var(--z1)} .tooltip.zoom2 .tt-room{color:var(--z2)}
  .tooltip.zoom3 .tt-room{color:var(--z3)} .tooltip.zoom4 .tt-room{color:var(--z4)}
  .tooltip.mihai .tt-room{color:var(--mihai)}

  .now-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--gold); z-index: 4; pointer-events: none; }
  .now-dot { position: absolute; left: -4px; top: -3px; width: 8px; height: 8px; border-radius: 50%; background: var(--gold); }

  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(5,10,20,0.7); z-index: 50; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--navy-light); border: 1px solid var(--border-light); border-radius: 14px; padding: 28px; width: 380px; font-family: 'Poppins',sans-serif; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #fff; }
  .modal label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; margin-top: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal input, .modal select { width: 100%; background: var(--navy); border: 1px solid var(--border-light); color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 13px; font-family: 'Poppins',sans-serif; }
  .modal input:focus, .modal select:focus { outline: none; border-color: var(--gold); }
  .modal .btn-row { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .modal .btn-row button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-family: 'Poppins',sans-serif; font-weight: 500; }
  .modal .btn-cancel { background: var(--navy-mid); color: var(--text); border: 1px solid var(--border-light); }
  .modal .btn-book { background: linear-gradient(135deg, var(--gold), #c49340); color: var(--navy); font-weight: 600; }
  .modal .btn-book:hover { opacity: 0.9; }

  .scroll-wrap { height: calc(100vh - 120px); overflow-y: auto; }
  .hidden { display: none !important; }

  .toast { position: fixed; bottom: 32px; right: 32px; padding: 14px 24px; border-radius: 10px; font-size: 13px; font-family: 'Poppins',sans-serif; font-weight: 500; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.4); transform: translateY(20px); opacity: 0; transition: all 0.3s; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: rgba(58,181,176,0.15); border: 1px solid var(--teal); color: var(--teal); }
  .toast.error { background: rgba(220,80,80,0.15); border: 1px solid #dc5050; color: #dc5050; }
</style>
</head>
<body>

<div class="topbar">
  <h1>📅 <span>RUF</span> Room Scheduler</h1>
  <div class="meta" id="metaInfo"></div>
</div>

<div class="controls">
  <button onclick="changeWeek(-1)">← Prev</button>
  <div class="week-label" id="weekLabel"></div>
  <button onclick="changeWeek(1)">Next →</button>
  <button onclick="currentWeekOffset=0;render()">Today</button>
  <div class="view-toggle">
    <button id="btnOverview" class="active" onclick="switchView('overview')">Overview</button>
    <button id="btnTimeline" onclick="switchView('timeline')">Timeline</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--z1)"></div>Zoom 1</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--z2)"></div>Zoom 2</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--z3)"></div>Zoom 3</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--z4)"></div>Zoom 4</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--mihai)"></div>Mihai</div>
  </div>
</div>

<div id="overviewView"><div class="status-bar" id="statusBar"></div><div class="overview-grid" id="overviewGrid"></div></div>
<div id="timelineView" class="hidden"><div class="scroll-wrap"><div class="timeline" id="timelineGrid"></div></div></div>
<div class="tooltip" id="tooltip"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Book a Room</h2>
    <label>Date & Time</label><input type="text" id="bookDateTime" readonly>
    <label>Room</label><select id="bookRoom"><option value="zoom1">Zoom 1</option><option value="zoom2">Zoom 2</option><option value="zoom3">Zoom 3</option><option value="zoom4">Zoom 4</option></select>
    <label>Duration</label><select id="bookDuration"><option value="30">30 min</option><option value="60" selected>1 hour</option><option value="90">1.5 hours</option><option value="120">2 hours</option></select>
    <label>Title</label><input type="text" id="bookTitle" placeholder="Meeting title...">
    <label>Your Name</label><input type="text" id="bookName" placeholder="Who's booking?">
    <label>Invite (emails)</label><input type="text" id="bookInvite" placeholder="email1@example.com, email2@example.com">
    <div id="bookStatus" style="margin-top:12px;font-size:12px;display:none;"></div>
    <div class="btn-row"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-book" id="bookBtn" onclick="submitBooking()">Book</button></div>
  </div>
</div>

function ro(wd,today){const g=document.getElementById('overviewGrid');g.innerHTML='<div class="ov-header"></div>';wd.forEach(d=>{const t=sd(d,today);g.innerHTML+=`<div class="ov-header ${t?'today':''}">${D[d.getDay()]}<br><b>${M[d.getMonth()]} ${d.getDate()}</b></div>`;});let busy=0,avail=0;RES.forEach(r=>{if(r.key==='Mihai')return;wd.forEach(d=>{ge(r.key,d).length>0?busy++:avail++;});});document.getElementById('statusBar').innerHTML=`<div class="status-card"><div class="label">Rooms</div><div class="value gold">${RES.length-1}</div></div><div class="status-card"><div class="label">Available</div><div class="value teal">${avail}</div></div><div class="status-card"><div class="label">Booked</div><div class="value warm">${busy}</div></div>`;RES.forEach(r=>{g.innerHTML+=`<div class="ov-resource"><div class="dot" style="background:${r.color}"></div>${r.key}</div>`;wd.forEach(d=>{const t=sd(d,today);const evts=ge(r.key,d);const roomVal=r.cls;const dateVal=ds(d);let onclick;if(r.key==='Mihai'){const z4busy=ge('Zoom 4',d).length>0;const defRoom=z4busy?'zoom3':'zoom4';onclick=` onclick="obOvMihai('${dateVal}','${defRoom}')"`;} else {onclick=` onclick="obOv('${dateVal}','${roomVal}','${r.key}')"`;} let h=`<div class="ov-cell ${t?'today':''}"${onclick}>`;if(!evts.length&&r.key!=='Mihai')h+=`<div class="ov-avail">✓ Available</div>`;else if(!evts.length)h+=`<div class="ov-avail">✓ Open</div>`;else evts.forEach(e=>{const es=new Date(e.start);h+=`<div class="ov-event ${r.cls}" title="${e.title}\n${ftd(es)} – ${ftd(new Date(e.end))}">${ftd(es)} ${e.title}</div>`;});h+='</div>';g.innerHTML+=h;});});}
function rt(wd,today){const g=document.getElementById('timelineGrid');g.innerHTML='';g.style.gridTemplateRows=`44px repeat(${EH-SH},${HH}px)`;g.innerHTML+='<div class="tl-corner"></div>';wd.forEach(d=>{const t=sd(d,today);g.innerHTML+=`<div class="tl-day-header ${t?'today':''}"><div class="dn">${D[d.getDay()]}</div><div class="dnum">${d.getDate()}</div><div>${M[d.getMonth()]}</div></div>`;});for(let h=SH;h<EH;h++){g.innerHTML+=`<div class="tl-time">${ft(h,0)}</div>`;wd.forEach(d=>{const s=ds(d);g.innerHTML+=`<div class="tl-cell" data-date="${s}" data-hour="${h}" onclick="ob('${s}',${h})"><div class="tl-half"></div></div>`;});}wd.forEach((d,di)=>{const s=ds(d);const fc=g.querySelector(`.tl-cell[data-date="${s}"][data-hour="${SH}"]`);if(!fc)return;fc.style.position='relative';RES.forEach((r,ri)=>{ge(r.key,d).forEach(e=>{const es=new Date(e.start),ee=new Date(e.end);const sm=es.getHours()*60+es.getMinutes(),em=ee.getHours()*60+ee.getMinutes();const top=((sm-SH*60)/60)*HH;const ht=Math.max(((em-sm)/60)*HH,5);const w=100/RES.length;const bl=document.createElement('div');bl.className=`ev ${r.cls}`;bl.style.cssText=`left:${ri*w+0.5}%;width:${w-1}%;top:${top}px;height:${ht}px;`;bl.setAttribute('data-room',r.key);bl.setAttribute('data-title',e.title);bl.setAttribute('data-start',ftd(es));bl.setAttribute('data-end',ftd(ee));bl.setAttribute('data-cls',r.cls);bl.addEventListener('mouseenter',stt);bl.addEventListener('mouseleave',htt);fc.appendChild(bl);});});if(sd(d,new Date())){const now=new Date();const nm=now.getHours()*60+now.getMinutes();const nt=((nm-SH*60)/60)*HH;if(nt>=0&&nt<=(EH-SH)*HH){const nl=document.createElement('div');nl.className='now-line';nl.style.top=nt+'px';nl.innerHTML='<div class="now-dot"></div>';fc.appendChild(nl);}}});}
function stt(ev){const el=ev.currentTarget,tt=document.getElementById('tooltip');tt.className=`tooltip ${el.getAttribute('data-cls')}`;tt.innerHTML=`<div class="tt-room">${el.getAttribute('data-room')}</div><div class="tt-title">${el.getAttribute('data-title')}</div><div class="tt-time">${el.getAttribute('data-start')} – ${el.getAttribute('data-end')}</div>`;tt.style.display='block';const r=el.getBoundingClientRect();tt.style.left=`${r.right+8}px`;tt.style.top=`${r.top}px`;const tr=tt.getBoundingClientRect();if(tr.right>window.innerWidth)tt.style.left=`${r.left-tr.width-8}px`;if(tr.bottom>window.innerHeight)tt.style.top=`${window.innerHeight-tr.height-8}px`;}
function htt(){document.getElementById('tooltip').style.display='none';}
let bD='',bH=0;
function obOv(date,roomCls,roomLabel){
  bD=date;bH=9;
  const d=new Date(date+'T00:00:00');
  document.getElementById('bookDateTime').value=`${D[d.getDay()]}, ${M[d.getMonth()]} ${d.getDate()} at ${ft(9,0)}`;
  document.getElementById('bookRoom').value=roomCls;
  document.getElementById('bookTitle').value='';
  document.getElementById('bookName').value='';
  document.getElementById('bookInvite').value='';
  document.getElementById('bookStatus').style.display='none';
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('bookTitle').focus(),100);
}
function obOvMihai(date,defRoom){
  bD=date;bH=9;
  const d=new Date(date+'T00:00:00');
  document.getElementById('bookDateTime').value=`${D[d.getDay()]}, ${M[d.getMonth()]} ${d.getDate()} at ${ft(9,0)}`;
  document.getElementById('bookRoom').value=defRoom;
  document.getElementById('bookTitle').value='Meeting with Mihai';
  document.getElementById('bookName').value='';
  document.getElementById('bookInvite').value='mihai@romanianunitedfund.org';
  document.getElementById('bookStatus').style.display='none';
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('bookName').focus(),100);
}
function ob(date,hour,roomCls){bD=date;bH=hour;const d=new Date(date+'T00:00:00');document.getElementById('bookDateTime').value=`${D[d.getDay()]}, ${M[d.getMonth()]} ${d.getDate()} at ${ft(hour,0)}`;document.getElementById('bookTitle').value='';document.getElementById('bookName').value='';document.getElementById('bookInvite').value='';document.getElementById('bookStatus').style.display='none';if(roomCls)document.getElementById('bookRoom').value=roomCls;document.getElementById('modalOverlay').classList.add('show');setTimeout(()=>document.getElementById('bookTitle').focus(),100);}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
const BOOK_TOKEN="CfPG8HqvuxOWEzeLOs0dwcAD1MKUmGmbQennV0C13uU";
async function submitBooking(){
const room=document.getElementById('bookRoom').value;
const dur=parseInt(document.getElementById('bookDuration').value);
const title=document.getElementById('bookTitle').value||'Meeting';
const booker=document.getElementById('bookName').value||'';
const inviteRaw=document.getElementById('bookInvite').value||'';
const attendees=inviteRaw.split(/[,;\s]+/).map(s=>s.trim()).filter(s=>s.includes('@'));
const btn=document.getElementById('bookBtn');
const st=document.getElementById('bookStatus');
btn.disabled=true;btn.textContent='Booking...';
st.style.display='none';
try{
const resp=await fetch('/api/book',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+BOOK_TOKEN},body:JSON.stringify({room,date:bD,hour:bH,minute:0,duration:dur,title,booker,attendees})});
const data=await resp.json();
if(data.ok){closeModal();showToast('✅ '+data.message,'success');}
else{st.style.display='block';st.style.color='#dc5050';st.textContent='❌ '+(data.error||'Booking failed');}
}catch(e){st.style.display='block';st.style.color='#dc5050';st.textContent='❌ Network error — is the server running?';}
btn.disabled=false;btn.textContent='Book';
}
function showToast(msg,type){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),4000);}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
render();
</script>
